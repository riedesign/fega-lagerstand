# /etc/nginx/sites-available/fega.rieste.org
# Link: ln -s ../sites-available/fega.rieste.org /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name fega.rieste.org;

    root /opt/fega-lagerstand;
    index index.php;

    # Schutz: sensible Dateien/Ordner nicht per HTTP erreichbar
    location ~ /\.(ht|env|git) { deny all; }
    location ~ ^/(config|includes|alteDatenansicht)/ { deny all; }

    # Statische Assets (CSS, JS, Bilder) direkt ausliefern
    location ~* \.(css|js|png|jpe?g|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Alles andere → index.php mit Query-String
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP via FPM — generischer Symlink, funktioniert unabhaengig
    # von der installierten PHP-Version. Falls der Symlink fehlt, auf
    # /run/php/php<version>-fpm.sock umstellen (z.B. php8.3-fpm.sock).
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_read_timeout 60s;
    }

    # Log
    access_log /var/log/nginx/fega-access.log;
    error_log  /var/log/nginx/fega-error.log;

    # Upload-Groesse (gibt aktuell keine Uploads, aber Default ist mini)
    client_max_body_size 2M;
}
